name: Test iOS Fastlane Pipeline

# Manually triggered from the Actions tab.
# workflow_dispatch is visible because the file exists on the default branch.
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      # Checks out whichever branch the dispatch is triggered from
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Ruby 3.4 matches the vendor/bundle Ruby version already in the repo;
      # bundler-cache: true runs bundle install and caches gems by Gemfile.lock
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install Meteor
        run: |
          curl https://install.meteor.com/ | sh
          echo "$HOME/.meteor" >> $GITHUB_PATH

      - name: Install Meteor dependencies
        run: meteor npm install

      # Both files must exist before meteor build — Cordova bakes them into the native project
      - name: Decode Firebase config files
        run: |
          mkdir -p private/ios private/android
          echo "${{ secrets.FIREBASE_IOS_DEV_PLIST_BASE64 }}" | base64 -d > private/ios/GoogleService-Info.plist
          echo "${{ secrets.FIREBASE_SERVICES_PROD }}"         | base64 -d > private/android/google-services.json

      # macOS uses BSD sed which requires '' after -i (unlike GNU sed on Linux).
      # mobile-config.js uses double quotes, so the sed pattern must too —
      # otherwise the substitution silently matches nothing and the build
      # ships with the production bundle ID.
      - name: Patch mobile-config.js for dev environment
        run: |
          sed -i '' 's/id: "org.mieweb.opensource"/id: "org.mieweb.os.dev"/'  mobile-config.js
          sed -i '' 's/name: "MIEAuth"/name: "MIEAuth Opensource Beta"/'      mobile-config.js
          grep -E "^\s*(id|name):" mobile-config.js   # fail loudly if patch missed

      # Generates the Xcode project inside ios-build/; must run before pod install
      - name: Build iOS with Meteor/Cordova
        run: |
          meteor build ./ios-build \
            --platforms ios \
            --server=https://mieauth-dev.os.mieweb.org

      # Podfile is generated by Cordova — only exists after meteor build completes
      - name: Install CocoaPods dependencies
        run: |
          PODFILE_DIR=$(dirname "$(find ios-build -name 'Podfile' -type f | head -1)")
          cd "$PODFILE_DIR"
          pod install

      # Prefer the CocoaPods workspace (not the embedded *.xcworkspace inside *.xcodeproj)
      # — same resolution logic as the existing deploy workflows
      - name: Resolve Xcode workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios-build -name "*.xcworkspace" \
            -not -path "*/*.xcodeproj/*" -type d | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME"       >> "$GITHUB_OUTPUT"

      # All secrets injected explicitly — no ambient credential leakage
      - name: Run Fastlane ios_dev lane
        env:
          MATCH_PASSWORD:                ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPLE_TEAM_ID:                 ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID:              ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID:           ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64:       ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          WORKSPACE_PATH:                ${{ steps.xcode.outputs.workspace }}
          XCODE_SCHEME:                  ${{ steps.xcode.outputs.scheme }}
        run: bundle exec fastlane ios_dev
