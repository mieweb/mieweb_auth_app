name: Test iOS Fastlane Pipeline

on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: mieweb/actions/setup-meteor@v1

      - name: Decode Firebase plists
        run: |
          mkdir -p private/ios private/android
          echo "${{ secrets.FIREBASE_IOS_DEV_PLIST_BASE64 }}" | base64 -d > private/ios/GoogleService-Info.plist
          echo "${{ secrets.FIREBASE_SERVICES_PROD }}" | base64 -d > private/android/google-services.json

      - name: Generate build info & beta icons
        run: |
          node generate-build-info.js
          pip3 install --break-system-packages Pillow
          python3 generate_app_resources.py public/icon-beta.png public/resources

      - name: Patch mobile-config.js
        run: |
          sed -i '' "s/id: ['\"]org.mieweb.opensource['\"]/id: 'org.mieweb.os.dev'/" mobile-config.js
          sed -i '' "s/name: ['\"]MIEAuth['\"]/name: 'MIEAuth Opensource Beta'/" mobile-config.js
          echo "App.setPreference('ios-CFBundleVersion', '${{ github.run_number }}');" >> mobile-config.js

      - uses: mieweb/actions/meteor-build@v1
        with:
          platform: ios
          server: https://mieauth-dev.os.mieweb.org

      - uses: mieweb/actions/ios@v1
        with:
          app_identifier: org.mieweb.os.dev
          apple_team_id: ${{ secrets.APPLE_TEAM_ID }}
          match_git_basic_authorization: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          match_password: ${{ secrets.MATCH_PASSWORD }}
          apple_api_key_id: ${{ secrets.APPLE_API_KEY_ID }}
          apple_api_issuer_id: ${{ secrets.APPLE_API_ISSUER_ID }}
          apple_api_key_p8_base64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          run_pod_install: "true"